<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Captiz — essai Spline (3D)</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cradialgradient id='g' cx='42%25' cy='40%25' r='60%25'%3E%3Cstop offset='0' stop-color='%23ffffff'/%3E%3Cstop offset='0.5' stop-color='%23dfe9ff'/%3E%3Cstop offset='1' stop-color='%230b0f19'/%3E%3C/radialgradient%3E%3Crect width='32' height='32' fill='%230b0f19'/%3E%3Ccircle cx='16' cy='16' r='8.5' fill='url(%23g)'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#070a12;--type:#EDEDED;--muted:#8a93a8;--line:rgba(255,255,255,.1);--accent:#8fb0ff;--mono:'JetBrains Mono',monospace}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--type);font-family:"Poppins",system-ui,sans-serif;min-height:100vh;overflow:hidden}

  /* la scène 3D occupe tout l'écran */
  #stage{position:fixed;inset:0;z-index:1}
  spline-viewer{width:100%;height:100%;display:block}

  /* overlays */
  nav{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;
    padding:22px clamp(20px,5vw,52px);pointer-events:none}
  .brand{display:inline-flex;align-items:center;gap:.16em;font-weight:600;font-size:22px;letter-spacing:-.04em;color:#fff;text-decoration:none;pointer-events:auto}
  .brand .d{width:.15em;height:.15em;border-radius:50%;background:#fff;box-shadow:0 0 12px 4px #cfe0ff}
  nav a.back{font-family:var(--mono);font-size:12px;letter-spacing:.04em;color:var(--muted);text-decoration:none;
    border:1px solid var(--line);padding:9px 16px;border-radius:999px;pointer-events:auto;transition:.25s}
  nav a.back:hover{color:#fff;border-color:#fff}

  .tag{position:fixed;top:50%;left:clamp(20px,6vw,90px);transform:translateY(-50%);z-index:15;max-width:430px;pointer-events:none}
  .tag .k{font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:18px;display:flex;align-items:center;gap:10px}
  .tag .k::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px 3px rgba(143,176,255,.6)}
  .tag h1{font-size:clamp(34px,5.5vw,64px);font-weight:600;letter-spacing:-.04em;line-height:1.02;text-shadow:0 2px 30px rgba(7,10,18,.6)}
  .tag p{margin-top:18px;color:#c7cdda;font-weight:300;text-shadow:0 1px 20px rgba(7,10,18,.7)}

  /* barre de contrôle : coller son URL de scène */
  .panel{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:20;
    display:flex;gap:8px;align-items:center;background:rgba(12,16,26,.75);backdrop-filter:blur(10px);
    border:1px solid var(--line);border-radius:999px;padding:8px 8px 8px 18px;max-width:92vw}
  .panel label{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--muted);white-space:nowrap}
  .panel input{flex:1;min-width:200px;background:transparent;border:none;outline:none;color:#fff;font-family:var(--mono);font-size:12.5px}
  .panel input::placeholder{color:#5b6478}
  .panel button{font-family:var(--mono);font-size:12px;color:#0b0f19;background:#EDF2FB;border:none;border-radius:999px;padding:10px 18px;cursor:pointer;transition:.25s}
  .panel button:hover{box-shadow:0 0 22px rgba(143,176,255,.5)}

  .hint{position:fixed;left:50%;bottom:74px;transform:translateX(-50%);z-index:18;font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;width:90vw}
  .hint a{color:var(--accent)}

  /* loader */
  #loader{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;background:var(--bg);transition:opacity .6s;pointer-events:none}
  #loader.hide{opacity:0}
  #loader .dot{width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 0 24px 8px #cfe0ff;animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(.8);opacity:.7}50%{transform:scale(1.3);opacity:1}}

  @media(max-width:760px){.tag{top:88px;transform:none;max-width:88vw}.panel label{display:none}}
</style>
</head>
<body>
  <div id="loader"><span class="dot"></span></div>

  <div id="stage">
    <!-- scène 3D Spline (remplace l'URL par la tienne, exportée depuis spline.design) -->
    <spline-viewer id="viewer" loading="eager"
      url="https://prod.spline.design/iEAs8HJFu91daMOq/scene.splinecode"></spline-viewer>
  </div>

  <nav>
    <a class="brand" href="index.html">captiz<span class="d"></span></a>
    <a class="back" href="index.html">← version WebGL</a>
  </nav>

  <div class="tag">
    <div class="k">Essai · 3D Spline</div>
    <h1>Le signal, en volume.</h1>
    <p>Colle l'URL de ta scène Spline ci-dessous pour la voir ici, dans l'habillage captiz.</p>
  </div>

  <div class="hint">Dans Spline : <b>Export → Spline Viewer → Copier l'URL</b> (…/scene.splinecode) · <a href="https://spline.design" target="_blank" rel="noopener">spline.design</a></div>

  <form class="panel" id="form">
    <label>scène</label>
    <input id="url" type="text" placeholder="https://prod.spline.design/XXXX/scene.splinecode" spellcheck="false" />
    <button type="submit">Charger</button>
  </form>

  <!-- runtime Spline (web component) -->
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.28/build/spline-viewer.js"></script>
  <script>
    const loader = document.getElementById('loader');
    const stage  = document.getElementById('stage');
    const form   = document.getElementById('form');
    const input  = document.getElementById('url');

    // masque le loader quand la scène est prête (ou après un délai de secours)
    function hideLoader(){ loader.classList.add('hide'); }
    function bindLoad(v){ v && v.addEventListener('load-complete', hideLoader); v && v.addEventListener('load', hideLoader); }
    bindLoad(document.getElementById('viewer'));
    setTimeout(hideLoader, 6000);

    // charger une scène personnalisée
    form.addEventListener('submit', e=>{
      e.preventDefault();
      const u = input.value.trim();
      if(!/^https?:\/\/.+scene\.splinecode$/.test(u)){ input.style.color = '#ff8a7a'; return; }
      input.style.color = '#fff';
      loader.classList.remove('hide');
      const old = document.getElementById('viewer'); if(old) old.remove();
      const v = document.createElement('spline-viewer');
      v.id = 'viewer'; v.setAttribute('loading','eager'); v.setAttribute('url', u);
      stage.appendChild(v); bindLoad(v); setTimeout(hideLoader, 6000);
    });
  </script>
</body>
</html>
